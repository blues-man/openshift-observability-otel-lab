showroom:
  enabled: true
  namespace: showroom
  name: showroom
  content:
    repoUrl: "https://github.com/blues-man/openshift-observability-otel-lab.git"
    repoRef: "main"
    antoraPlaybook: "site.yml"
    image: "quay.io/rhpds/showroom-content:v1.4.2"
  userdata:
    tutorialNamespace: "observability-app-user1"
    tempoNamespace: "tempo-observability"
    lokiNamespace: "openshift-logging"
    cooNamespace: "coo-observability"
    userName: "user1"
    userPassword: "openshift"
  nookbag:
    enabled: true
    bundleUrl: "https://github.com/rhpds/nookbag/releases/download/nookbag-v0.3.7/nookbag-v0.3.7.zip"
  terminal:
    enabled: true
    image: "quay.io/rhpds/openshift-showroom-terminal-ocp:latest"
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

deployer:
  domain: ""

demo:
  namespace: ""
  appName: ""
