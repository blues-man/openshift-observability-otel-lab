{{- if .Values.backend.enabled }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.backend.tempo.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: Secret
metadata:
  name: tempo-minio
  namespace: {{ .Values.backend.tempo.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
data:
  accesskey: {{ .Values.backend.tempo.minio.accessKey | b64enc }}
  secretkey: {{ .Values.backend.tempo.minio.secretKey | b64enc }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tempo-minio
  namespace: {{ .Values.backend.tempo.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backend.tempo.minio.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo-minio
  namespace: {{ .Values.backend.tempo.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo-minio
  template:
    metadata:
      labels:
        app: tempo-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - minio
            - server
            - /data
          ports:
            - containerPort: 9000
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tempo-minio
                  key: accesskey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tempo-minio
                  key: secretkey
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tempo-minio
---
apiVersion: v1
kind: Service
metadata:
  name: tempo-minio
  namespace: {{ .Values.backend.tempo.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: tempo-minio
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: simplest
  namespace: {{ .Values.backend.tempo.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  storage:
    secret:
      name: tempo-minio
      type: s3
    tls:
      enabled: false
  storageSize: {{ .Values.backend.tempo.storageSize }}
  template:
    gateway:
      enabled: true
    queryFrontend:
      jaegerQuery:
        enabled: true
  tenants:
    mode: openshift
    authentication:
      - tenantName: dev
        tenantId: ""
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempostack-traces-reader
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups:
      - tempo.grafana.com
    resources:
      - dev
    resourceNames:
      - traces
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tempostack-traces-reader
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tempostack-traces-reader
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:authenticated
{{- end }}
