{{- if .Values.operators.enabled }}
# ============================================================
# OpenTelemetry Operator (AllNamespaces install mode)
# ============================================================
{{- if .Values.operators.opentelemetry.enabled }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.operators.opentelemetry.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  labels:
    demo.redhat.com/application: "observability-lab"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.operators.opentelemetry.namespace }}-og
  namespace: {{ .Values.operators.opentelemetry.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec: {}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.operators.opentelemetry.name }}
  namespace: {{ .Values.operators.opentelemetry.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    demo.redhat.com/application: "observability-lab"
spec:
  channel: {{ .Values.operators.opentelemetry.channel }}
  installPlanApproval: {{ .Values.operators.opentelemetry.installPlanApproval }}
  name: {{ .Values.operators.opentelemetry.name }}
  source: {{ .Values.operators.opentelemetry.source }}
  sourceNamespace: {{ .Values.operators.opentelemetry.sourceNamespace }}
{{- end }}

