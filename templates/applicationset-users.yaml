{{ if gt (int .Values.user.count) 0 -}}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Release.Name }}-dice-game-users
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "observability-lab"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  generators:
  - list:
      elements:
{{- $userCount := int .Values.user.count }}
{{- range $index := until $userCount }}
      - user: {{ $.Values.user.prefix }}{{ add $index 1 }}
{{- end }}
  template:
    metadata:
      name: {{ .Release.Name }}-dice-game-{{- "{{" }} user {{- "}}" }}
      namespace: {{ .Values.argocd.namespace }}
      labels:
        demo.redhat.com/application: "observability-lab"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: {{ .Values.argocd.project }}
      source:
        repoURL: {{ .Values.gitops.repoUrl }}
        targetRevision: {{ .Values.gitops.revision }}
        path: {{ .Values.gitops.basePath }}/components/dice-game
        helm:
          values: |
            app:
              enabled: {{ .Values.components.diceGame.enabled }}
              namespace: observability-app-{{- "{{" }} user {{- "}}" }}
              user: {{ "{{" }} user {{- "}}" }}
              frontend: {{ .Values.components.diceGame.frontend | toYaml | nindent 16 }}
              backend1: {{ .Values.components.diceGame.backend1 | toYaml | nindent 16 }}
              backend2: {{ .Values.components.diceGame.backend2 | toYaml | nindent 16 }}
              backend3: {{ .Values.components.diceGame.backend3 | toYaml | nindent 16 }}
              loadgen: {{ .Values.components.diceGame.loadgen | toYaml | nindent 16 }}
              collector: {{ .Values.components.diceGame.collector | toYaml | nindent 16 }}
              userInfo: {{ .Values.components.diceGame.userInfo | toYaml | nindent 16 }}
              observabilityViewer:
                tempoNamespace: {{ .Values.components.observabilityBackend.tempo.namespace | quote }}
                lokiNamespace: {{ .Values.components.observabilityBackend.loki.namespace | quote }}
                cooNamespace: {{ .Values.components.observabilityBackend.coo.namespace | quote }}
            deployer:
              domain: {{ .Values.deployer.domain | quote }}
      destination:
        server: https://kubernetes.default.svc
        namespace: observability-app-{{- "{{" }} user {{- "}}" }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 30
          backoff:
            duration: "5s"
            factor: 2
            maxDuration: "5m"
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Release.Name }}-showroom-users
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "observability-lab"
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  generators:
  - list:
      elements:
{{- $userCount2 := int .Values.user.count }}
{{- range $index := until $userCount2 }}
      - user: {{ $.Values.user.prefix }}{{ add $index 1 }}
{{- end }}
  template:
    metadata:
      name: {{ .Release.Name }}-showroom-{{- "{{" }} user {{- "}}" }}
      namespace: {{ .Values.argocd.namespace }}
      labels:
        demo.redhat.com/application: "observability-lab"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: {{ .Values.argocd.project }}
      source:
        repoURL: {{ .Values.gitops.repoUrl }}
        targetRevision: {{ .Values.gitops.revision }}
        path: {{ .Values.gitops.basePath }}/components/showroom
        helm:
          values: |
            showroom:
              enabled: {{ .Values.components.showroom.enabled }}
              namespace: showroom-{{- "{{" }} user {{- "}}" }}
              name: {{ .Values.components.showroom.name }}
              content: {{ .Values.components.showroom.content | toYaml | nindent 16 }}
              terminal: {{ .Values.components.showroom.terminal | toYaml | nindent 16 }}
              nookbag: {{ .Values.components.showroom.nookbag | toYaml | nindent 16 }}
              userdata:
                tutorialNamespace: observability-app-{{- "{{" }} user {{- "}}" }}
                tempoNamespace: {{ .Values.components.observabilityBackend.tempo.namespace | quote }}
                lokiNamespace: {{ .Values.components.observabilityBackend.loki.namespace | quote }}
                cooNamespace: {{ .Values.components.observabilityBackend.coo.namespace | quote }}
                userName: {{ "{{" }} user {{- "}}" }}
                userPassword: "openshift"
            deployer:
              domain: {{ .Values.deployer.domain | quote }}
            demo:
              namespace: observability-app-{{- "{{" }} user {{- "}}" }}
              appName: "dice-game"
      destination:
        server: https://kubernetes.default.svc
        namespace: showroom-{{- "{{" }} user {{- "}}" }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 30
          backoff:
            duration: "5s"
            factor: 2
            maxDuration: "5m"
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
{{- end }}
