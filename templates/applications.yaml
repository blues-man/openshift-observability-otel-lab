# App of Apps — generates ArgoCD Applications for each enabled component

{{- if .Values.components.operators.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-operators
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "observability-lab"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/operators
    helm:
      valuesObject:
        operators: {{ .Values.components.operators | toYaml | nindent 10 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}

{{- if .Values.components.observabilityBackend.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Release.Name }}-observability-backend
  namespace: {{ .Values.argocd.namespace }}
  labels:
    demo.redhat.com/application: "observability-lab"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.gitops.repoUrl }}
    targetRevision: {{ .Values.gitops.revision }}
    path: {{ .Values.gitops.basePath }}/components/observability-backend
    helm:
      valuesObject:
        backend: {{ .Values.components.observabilityBackend | toYaml | nindent 10 }}
        deployer:
          domain: {{ .Values.deployer.domain | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: tempo-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
{{- end }}

