---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - showroom_guid is defined and showroom_guid | length > 0
      - showroom_deployer_domain is defined and showroom_deployer_domain | length > 0
    fail_msg: "showroom_guid and showroom_deployer_domain are required"

- name: Create showroom namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ showroom_namespace }}"
        labels:
          demo.redhat.com/application: showroom
          demo.redhat.com/guid: "{{ showroom_guid }}"

- name: Create ServiceAccount
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: showroom
        namespace: "{{ showroom_namespace }}"

- name: Create edit RoleBinding for ServiceAccount
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: edit-showroom-sa
        namespace: "{{ showroom_namespace }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: edit
      subjects:
        - kind: ServiceAccount
          name: showroom
          namespace: "{{ showroom_namespace }}"

- name: Build user_data content
  ansible.builtin.set_fact:
    _showroom_user_data_content: |
      {% for key, value in showroom_user_data.items() %}
      {{ key }}: {{ value | string | to_json if value is string else value }}
      {% endfor %}

- name: Create user_data ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: showroom-userdata
        namespace: "{{ showroom_namespace }}"
      data:
        user_data.yml: "{{ _showroom_user_data_content }}"

- name: Create nginx proxy ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: showroom-proxy-config
        namespace: "{{ showroom_namespace }}"
      data:
        nginx.conf: |
          events {
          }
          error_log /dev/stdout info;
          http {
            include /etc/nginx/mime.types;
            proxy_cache off;
            expires -1;
            proxy_cache_path /dev/null keys_zone=mycache:10m;
            map $http_upgrade $connection_upgrade {
                default upgrade;
                '' close;
            }
            server {
              listen 8080;
              absolute_redirect off;
              location / {
                proxy_pass http://127.0.0.1:8000;
                expires off;
                proxy_cache off;
                proxy_pass_request_headers on;
                proxy_set_header Accept-Encoding "gzip";
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
          {% if showroom_terminal_enabled %}
              location /terminal/ {
                proxy_pass http://127.0.0.1:7681;
                rewrite ^/terminal/(.*)$ /$1 break;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_read_timeout 43200000;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Host $http_host;
                proxy_set_header X-NginX-Proxy true;
              }
          {% endif %}
            }
          }

- name: Create terminal PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: showroom-terminal-lab-user-home
        namespace: "{{ showroom_namespace }}"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
  when: showroom_terminal_enabled

- name: Deploy showroom pod
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: showroom
        namespace: "{{ showroom_namespace }}"
        labels:
          demo.redhat.com/application: showroom
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: showroom
        strategy:
          type: Recreate
        template:
          metadata:
            labels:
              app.kubernetes.io/name: showroom
          spec:
            serviceAccountName: showroom
            initContainers:
              - name: git-cloner
                image: "{{ showroom_git_cloner_image }}"
                env:
                  - name: GIT_REPO_URL
                    value: "{{ showroom_content_git_repo }}"
                  - name: GIT_REPO_REF
                    value: "{{ showroom_content_git_repo_ref }}"
                  - name: CLONE_DIR
                    value: /showroom/repo
                volumeMounts:
                  - mountPath: /showroom/repo
                    name: showroom-files
                    subPath: repo
              - name: antora-builder
                image: "{{ showroom_antora_image }}"
                env:
                  - name: FILES_DIR
                    value: /showroom/repo
                  - name: OUTPUT_DIR
                    value: /showroom/www
                  - name: ANTORA_SITE_FILE
                    value: "{{ showroom_antora_playbook }}"
                volumeMounts:
                  - mountPath: /showroom/repo
                    name: showroom-files
                    subPath: repo
                  - name: user-data
                    mountPath: /user_data/
                  - mountPath: /showroom/www
                    name: showroom-files
                    subPath: www
            containers:
              - name: nginx
                image: "{{ showroom_proxy_image }}"
                imagePullPolicy: IfNotPresent
                volumeMounts:
                  - mountPath: /etc/nginx/nginx.conf
                    name: nginx-config
                    subPath: nginx.conf
                  - mountPath: /var/cache/nginx
                    name: nginx-cache
                  - mountPath: /var/run
                    name: nginx-pid
                ports:
                  - name: web
                    containerPort: 8080
              - name: content
                image: "{{ showroom_content_image }}"
                imagePullPolicy: IfNotPresent
                env:
                  - name: GIT_REPO_URL
                    value: "{{ showroom_content_git_repo }}"
                  - name: GIT_REPO_REF
                    value: "{{ showroom_content_git_repo_ref }}"
                  - name: ANTORA_PLAYBOOK
                    value: "{{ showroom_antora_playbook }}"
                  - name: DOMAIN
                    value: "{{ showroom_deployer_domain }}"
                volumeMounts:
                  - name: user-data
                    mountPath: /user_data/
                  - mountPath: /showroom/repo
                    name: showroom-files
                    subPath: repo
                  - mountPath: /showroom/www
                    name: showroom-files
                    subPath: www
                ports:
                  - containerPort: 8000
                    protocol: TCP
                livenessProbe:
                  httpGet:
                    path: /
                    port: 8000
                readinessProbe:
                  httpGet:
                    path: /
                    port: 8000
              - name: terminal
                image: "{{ showroom_terminal_image }}"
                imagePullPolicy: IfNotPresent
                env:
                  - name: NAMESPACE
                    valueFrom:
                      fieldRef:
                        fieldPath: metadata.namespace
                volumeMounts:
                  - name: terminal-lab-user-home
                    mountPath: /home/lab-user
                ports:
                  - containerPort: 7681
                    protocol: TCP
                resources:
                  limits:
                    cpu: "{{ showroom_terminal_resources.limits.cpu }}"
                    memory: "{{ showroom_terminal_resources.limits.memory }}"
                  requests:
                    cpu: "{{ showroom_terminal_resources.requests.cpu }}"
                    memory: "{{ showroom_terminal_resources.requests.memory }}"
            volumes:
              - name: showroom-files
                emptyDir: {}
              - name: user-data
                configMap:
                  name: showroom-userdata
              - name: nginx-config
                configMap:
                  defaultMode: 420
                  name: showroom-proxy-config
              - name: nginx-pid
                emptyDir: {}
              - name: nginx-cache
                emptyDir: {}
              - name: terminal-lab-user-home
                persistentVolumeClaim:
                  claimName: showroom-terminal-lab-user-home

- name: Create showroom Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: showroom
        namespace: "{{ showroom_namespace }}"
      spec:
        type: ClusterIP
        ports:
          - port: 8080
            protocol: TCP
            targetPort: 8080
        selector:
          app.kubernetes.io/name: showroom

- name: Create showroom Route
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: showroom
        namespace: "{{ showroom_namespace }}"
        annotations:
          haproxy.router.openshift.io/timeout: 1h
          haproxy.router.openshift.io/timeout-tunnel: 1h
      spec:
        to:
          kind: Service
          name: showroom
        port:
          targetPort: 8080
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
        wildcardPolicy: None

- name: Wait for showroom deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: showroom
    namespace: "{{ showroom_namespace }}"
  register: _showroom_deployment
  until:
    - _showroom_deployment.resources | length > 0
    - (_showroom_deployment.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Get showroom Route URL
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: showroom
    namespace: "{{ showroom_namespace }}"
  register: _showroom_route

- name: Set showroom_url fact
  ansible.builtin.set_fact:
    showroom_url: "https://{{ _showroom_route.resources[0].spec.host }}"
  when: _showroom_route.resources | length > 0

- name: Display showroom URL
  ansible.builtin.debug:
    msg: "Showroom for {{ showroom_guid }}: {{ showroom_url }}"
